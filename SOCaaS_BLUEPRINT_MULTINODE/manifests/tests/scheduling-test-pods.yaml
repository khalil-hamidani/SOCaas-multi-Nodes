apiVersion: v1
kind: Pod
metadata:
  name: siem-scheduling-test
  namespace: socaas-siem
spec:
  nodeSelector:
    node-role: siem
  restartPolicy: Never
  containers:
    - name: pause
      image: registry.k8s.io/pause:3.9
---
apiVersion: v1
kind: Pod
metadata:
  name: soar-scheduling-test
  namespace: socaas-soar
spec:
  nodeSelector:
    node-role: soar
  restartPolicy: Never
  containers:
    - name: pause
      image: registry.k8s.io/pause:3.9
