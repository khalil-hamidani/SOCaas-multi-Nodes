{{- if .Values.storage.createStaticPVs }}
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{ .Values.storage.storageClassName }}
  labels:
    {{- include "socaas.labels" . | nindent 4 }}
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: {{ .Values.storage.reclaimPolicy }}
---
{{- $sc := .Values.storage.storageClassName -}}
{{- $rp := .Values.storage.reclaimPolicy -}}
{{- $w1 := .Values.storage.worker1Hostname -}}
{{- $w2 := .Values.storage.worker2Hostname -}}
{{- $siem := .Values.namespaces.siem -}}
{{- $soar := .Values.namespaces.soar -}}
{{- $ir := .Values.namespaces.ir -}}
apiVersion: v1
kind: PersistentVolume
metadata:
  name: socaas-pv-wazuh-indexer
  labels: {app.kubernetes.io/part-of: socaas, socaas.layer: siem}
spec:
  capacity: {storage: {{ .Values.storage.sizes.wazuhIndexer }}}
  volumeMode: Filesystem
  accessModes: ["ReadWriteOnce"]
  persistentVolumeReclaimPolicy: {{ $rp }}
  storageClassName: {{ $sc }}
  local: {path: {{ .Values.storage.paths.wazuhIndexer | quote }}}
  claimRef: {namespace: {{ $siem }}, name: wazuh-indexer-pvc}
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values: [{{ $w1 | quote }}]
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: socaas-pv-wazuh-manager
  labels: {app.kubernetes.io/part-of: socaas, socaas.layer: siem}
