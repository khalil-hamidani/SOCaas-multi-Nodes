{{- if .Values.shuffle.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: socaas-shuffle-opensearch
  namespace: {{ .Values.namespaces.soar }}
  labels:
    {{- include "socaas.labels" . | nindent 4 }}
    app.kubernetes.io/component: shuffle-opensearch
    socaas.layer: soar
spec:
  serviceName: socaas-shuffle-opensearch
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: socaas-shuffle-opensearch
      app.kubernetes.io/component: shuffle-opensearch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: socaas-shuffle-opensearch
        app.kubernetes.io/component: shuffle-opensearch
        app.kubernetes.io/part-of: socaas
        socaas.layer: soar
    spec:
      nodeSelector:
        {{- include "socaas.soarNodeSelector" . | nindent 8 }}
      securityContext:
        fsGroup: 1000
      containers:
        - name: opensearch
          image: {{ .Values.shuffle.opensearch.image | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - {name: discovery.type, value: single-node}
            - {name: plugins.security.disabled, value: "true"}
            - {name: OPENSEARCH_JAVA_OPTS, value: {{ .Values.shuffle.opensearch.javaOpts | quote }}}
          ports:
            - {name: http, containerPort: 9200}
          volumeMounts:
            - {name: data, mountPath: /usr/share/opensearch/data}
          readinessProbe:
            tcpSocket: {port: 9200}
            initialDelaySeconds: 45
            periodSeconds: 15
          livenessProbe:
            tcpSocket: {port: 9200}
            initialDelaySeconds: 120
            periodSeconds: 30
          resources:
            {{- toYaml .Values.shuffle.opensearch.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: shuffle-opensearch-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: socaas-shuffle-opensearch
  namespace: {{ .Values.namespaces.soar }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: socaas-shuffle-opensearch
    app.kubernetes.io/component: shuffle-opensearch
  ports:
    - {name: http, port: 9200, targetPort: 9200}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: socaas-redis
  namespace: {{ .Values.namespaces.soar }}
  labels:
    {{- include "socaas.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: socaas-redis
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: socaas-redis
        app.kubernetes.io/component: redis
        app.kubernetes.io/part-of: socaas
        socaas.layer: soar
    spec:
      nodeSelector:
        {{- include "socaas.soarNodeSelector" . | nindent 8 }}
      containers:
        - name: redis
          image: {{ .Values.shuffle.redis.image | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - {name: redis, containerPort: 6379}
          volumeMounts:
            - {name: data, mountPath: /data}
          readinessProbe:
            tcpSocket: {port: 6379}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket: {port: 6379}
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.shuffle.redis.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: redis-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: socaas-redis
  namespace: {{ .Values.namespaces.soar }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: socaas-redis
    app.kubernetes.io/component: redis
  ports:
    - {name: redis, port: 6379, targetPort: 6379}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: socaas-shuffle-backend
  namespace: {{ .Values.namespaces.soar }}
  labels:
    {{- include "socaas.labels" . | nindent 4 }}
    app.kubernetes.io/component: shuffle-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: socaas-shuffle-backend
      app.kubernetes.io/component: shuffle-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: socaas-shuffle-backend
        app.kubernetes.io/component: shuffle-backend
        app.kubernetes.io/part-of: socaas
        socaas.layer: soar
    spec:
      nodeSelector:
        {{- include "socaas.soarNodeSelector" . | nindent 8 }}
      containers:
        - name: backend
          image: "{{ .Values.shuffle.backend.image }}:{{ .Values.shuffle.version }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - {name: SHUFFLE_APP_SDK_VERSION, value: latest}
            - {name: SHUFFLE_OPENSEARCH_URL, value: "http://socaas-shuffle-opensearch:9200"}
            - {name: REDIS_HOST, value: socaas-redis}
            - name: SHUFFLE_ADMIN_EMAIL
              valueFrom: {secretKeyRef: {name: socaas-shuffle-secrets, key: admin-email}}
            - name: SHUFFLE_ADMIN_PASSWORD
              valueFrom: {secretKeyRef: {name: socaas-shuffle-secrets, key: admin-password}}
          ports:
            - {name: http, containerPort: 5001}
          volumeMounts:
            - {name: backend-data, mountPath: /shuffle-files}
          readinessProbe:
            tcpSocket: {port: 5001}
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            tcpSocket: {port: 5001}
            initialDelaySeconds: 90
            periodSeconds: 30
          resources:
            {{- toYaml .Values.shuffle.backend.resources | nindent 12 }}
      volumes:
        - name: backend-data
          persistentVolumeClaim:
            claimName: shuffle-backend-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: socaas-shuffle-backend
  namespace: {{ .Values.namespaces.soar }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: socaas-shuffle-backend
    app.kubernetes.io/component: shuffle-backend
  ports:
    - {name: http, port: 5001, targetPort: 5001}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: socaas-shuffle-frontend
  namespace: {{ .Values.namespaces.soar }}
  labels:
    {{- include "socaas.labels" . | nindent 4 }}
    app.kubernetes.io/component: shuffle-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: socaas-shuffle-frontend
      app.kubernetes.io/component: shuffle-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: socaas-shuffle-frontend
        app.kubernetes.io/component: shuffle-frontend
        app.kubernetes.io/part-of: socaas
        socaas.layer: soar
    spec:
      nodeSelector:
        {{- include "socaas.soarNodeSelector" . | nindent 8 }}
      containers:
        - name: frontend
          image: "{{ .Values.shuffle.frontend.image }}:{{ .Values.shuffle.version }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - {name: BACKEND_HOSTNAME, value: "socaas-shuffle-backend"}
          ports:
            - {name: http, containerPort: 80}
          readinessProbe:
            tcpSocket: {port: 80}
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket: {port: 80}
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            {{- toYaml .Values.shuffle.frontend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: socaas-shuffle-frontend
  namespace: {{ .Values.namespaces.soar }}
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: socaas-shuffle-frontend
    app.kubernetes.io/component: shuffle-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: {{ .Values.shuffle.frontend.nodePort }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: socaas-shuffle-orborus
  namespace: {{ .Values.namespaces.soar }}
  labels:
    {{- include "socaas.labels" . | nindent 4 }}
    app.kubernetes.io/component: shuffle-orborus
spec:
  replicas: {{ .Values.shuffle.orborus.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: socaas-shuffle-orborus
      app.kubernetes.io/component: shuffle-orborus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: socaas-shuffle-orborus
        app.kubernetes.io/component: shuffle-orborus
        app.kubernetes.io/part-of: socaas
        socaas.layer: soar
    spec:
      serviceAccountName: socaas-shuffle-orborus
      nodeSelector:
        {{- include "socaas.soarNodeSelector" . | nindent 8 }}
      containers:
        - name: orborus
          image: "{{ .Values.shuffle.orborus.image }}:{{ .Values.shuffle.version }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - {name: BACKEND_HOSTNAME, value: "socaas-shuffle-backend"}
            {{- if .Values.shuffle.orborus.environmentName }}
            - {name: ENVIRONMENT_NAME, value: {{ .Values.shuffle.orborus.environmentName | quote }}}
            {{- else }}
            - {name: ENVIRONMENT_NAME, value: "Shuffle"}
            {{- end }}
            - {name: SHUFFLE_WORKER_VERSION, value: {{ .Values.shuffle.version | quote }}}
            - {name: SHUFFLE_BACKEND_URL, value: "http://socaas-shuffle-backend.{{ .Values.namespaces.soar }}.svc.cluster.local:5001"}
            {{- if .Values.shuffle.orborus.baseUrl }}
            - {name: BASE_URL, value: {{ .Values.shuffle.orborus.baseUrl | quote }}}
            {{- end }}
            {{- if .Values.shuffle.orborus.dockerHost }}
            - {name: DOCKER_HOST, value: {{ .Values.shuffle.orborus.dockerHost | quote }}}
            {{- end }}
            {{- if .Values.shuffle.orborus.dockerApiVersion }}
            - {name: DOCKER_API_VERSION, value: {{ .Values.shuffle.orborus.dockerApiVersion | quote }}}
            {{- else }}
            - {name: DOCKER_API_VERSION, value: "1.44"}
            {{- end }}
            - {name: SHUFFLE_SKIP_PIPELINES, value: {{ .Values.shuffle.orborus.skipPipelines | default "false" | quote }}}
            {{- if .Values.shuffle.orborus.volumeBinds }}
            - {name: SHUFFLE_VOLUME_BINDS, value: {{ .Values.shuffle.orborus.volumeBinds | quote }}}
            {{- end }}
          {{- if .Values.shuffle.orborus.dockerSocketMount }}
          volumeMounts:
            - mountPath: /var/run/docker.sock
              name: docker-sock
          {{- end }}
          resources:
            {{- toYaml .Values.shuffle.orborus.resources | nindent 12 }}
      {{- if .Values.shuffle.orborus.dockerSocketMount }}
      volumes:
        - hostPath:
            path: /var/run/docker.sock
            type: Socket
          name: docker-sock
      {{- end }}
{{- end }}
