apiVersion: v1
kind: ServiceAccount
metadata:
  name: socaas-shuffle-orborus
  namespace: {{ .Values.namespaces.soar }}
  labels:
    {{- include "socaas.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: socaas-shuffle-orborus
  namespace: {{ .Values.namespaces.soar }}
  labels:
    {{- include "socaas.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "configmaps", "secrets"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: socaas-shuffle-orborus
  namespace: {{ .Values.namespaces.soar }}
  labels:
    {{- include "socaas.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: socaas-shuffle-orborus
    namespace: {{ .Values.namespaces.soar }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: socaas-shuffle-orborus
