apiVersion: v1
kind: Secret
metadata:
  name: socaas-wazuh-secrets
  namespace: {{ .Values.namespaces.siem }}
  labels:
    {{- include "socaas.labels" . | nindent 4 }}
type: Opaque
stringData:
  admin-user: {{ .Values.secrets.wazuh.adminUser | quote }}
  admin-password: {{ .Values.secrets.wazuh.adminPassword | quote }}
  api-user: {{ .Values.secrets.wazuh.apiUser | quote }}
  api-password: {{ .Values.secrets.wazuh.apiPassword | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: socaas-shuffle-secrets
  namespace: {{ .Values.namespaces.soar }}
  labels:
    {{- include "socaas.labels" . | nindent 4 }}
type: Opaque
stringData:
  admin-email: {{ .Values.secrets.shuffle.adminEmail | quote }}
  admin-password: {{ .Values.secrets.shuffle.adminPassword | quote }}
  opensearch-user: {{ .Values.secrets.shuffle.opensearchUser | quote }}
  opensearch-password: {{ .Values.secrets.shuffle.opensearchPassword | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: socaas-thehive-secrets
  namespace: {{ .Values.namespaces.ir }}
  labels:
    {{- include "socaas.labels" . | nindent 4 }}
type: Opaque
stringData:
  secret: {{ .Values.secrets.thehive.secret | quote }}
  minio-access-key: {{ .Values.secrets.thehive.minioAccessKey | quote }}
  minio-secret-key: {{ .Values.secrets.thehive.minioSecretKey | quote }}
  api-key: {{ .Values.secrets.thehive.apiKey | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: socaas-pipeline-secrets
  namespace: {{ .Values.namespaces.siem }}
  labels:
    {{- include "socaas.labels" . | nindent 4 }}
type: Opaque
stringData:
  shared-secret: {{ .Values.secrets.pipeline.sharedSecret | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: socaas-pipeline-secrets
  namespace: {{ .Values.namespaces.soar }}
  labels:
    {{- include "socaas.labels" . | nindent 4 }}
type: Opaque
stringData:
  shared-secret: {{ .Values.secrets.pipeline.sharedSecret | quote }}
  native-shuffle-webhook-url: {{ .Values.pipeline.nativeShuffleWebhookUrl | quote }}
  thehive-api-key: {{ .Values.secrets.thehive.apiKey | quote }}
